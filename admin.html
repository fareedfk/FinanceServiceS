.background{

height:100%;

background:

@keyframes bgZoom{

to{

.cursor{

position:fixed;

border-radius:50%;

pointer-events:none;

z-index:-1;

transition:0.08s linear;

}

/* GRID */

.grid{

position:absolute;
width:100%;
height:100%;

background-image:
linear-gradient(rgba(255,215,0,0.04) 1px, transparent 1px),

.light{

position:absolute;

filter:blur(100px);

}

.light1{

width:300px;
height:300px;

top:-100px;
left:-100px;

}

.light2{

width:250px;

background:#00ffcc;

bottom:-100px;
right:-100px;

animation-delay:2s;

}

@keyframes floatLight{

from{

}

to{

}

}

.card3{

to{

}

}

</style>
